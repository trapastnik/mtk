server {
  listen 80 default_server;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # служебные файлы репозитория не отдаём наружу
  location ~* \.(conf|ya?ml|md)$ { deny all; }
  location ~ /\.            { deny all; }   # .git, .gitignore и пр.

  # HTML/JS/JSON — без кеша (чтобы не залипала старая версия витрины)
  location ~* \.(html?|js|mjs|json)$ { add_header Cache-Control "no-cache"; }

  # шрифты и картинки — кеш
  location ~* \.(png|jpe?g|webp|gif|svg|woff2?|otf|ttf)$ {
    expires 7d; add_header Cache-Control "public, must-revalidate";
  }

  location / { try_files $uri $uri/ =404; }
}
